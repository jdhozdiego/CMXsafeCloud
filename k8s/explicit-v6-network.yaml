apiVersion: v1
kind: Namespace
metadata:
  name: mac-demo
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: explicit-v6-lan
  namespace: mac-demo
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "explicit-v6-lan",
      "type": "bridge",
      "bridge": "br-explicit-v6",
      "isGateway": false,
      "ipMasq": false,
      "ipam": {
        "type": "host-local",
        "ranges": [
          [
            {
              "subnet": "fd42:4242:ff::/64"
            }
          ]
        ]
      }
    }
---
