apiVersion: v1
kind: ServiceAccount
metadata:
  name: cmxsafe-secure-path-observer
  namespace: mac-ssh-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cmxsafe-secure-path-observer
  namespace: mac-ssh-demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cmxsafe-secure-path-observer
  namespace: mac-ssh-demo
subjects:
  - kind: ServiceAccount
    name: cmxsafe-secure-path-observer
    namespace: mac-ssh-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cmxsafe-secure-path-observer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmxsafe-secure-path-observer
  namespace: mac-ssh-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmxsafe-secure-path-observer
  template:
    metadata:
      labels:
        app: cmxsafe-secure-path-observer
    spec:
      serviceAccountName: cmxsafe-secure-path-observer
      containers:
        - name: observer
          image: cmxsafemac-ipv6-secure-path-observer:docker-desktop-v16
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
          env:
            - name: PORT
              value: "8086"
            - name: SSH_DASHBOARD_BASE_URL
              value: http://portable-openssh-dashboard.mac-ssh-demo.svc.cluster.local:8084
            - name: MAC_ALLOCATOR_BASE_URL
              value: http://net-identity-allocator.mac-allocator.svc.cluster.local:8080
            - name: TRAFFIC_COLLECTOR_BASE_URL
              value: http://cmxsafemac-ipv6-traffic-collector.mac-allocator.svc.cluster.local:8082
            - name: GATEWAY_NAMESPACE
              value: mac-ssh-demo
            - name: GATEWAY_LABEL_SELECTOR
              value: app=portable-openssh-busybox
            - name: REPLICA_COLLECTOR_PORT
              value: "8083"
            - name: APPLICATION_EVENT_NAMESPACE
              value: mac-ssh-demo
            - name: APPLICATION_EVENT_LABEL_SELECTOR
              value: cmxsafe-role=platform
            - name: APPLICATION_EVENT_PORT
              value: "9000"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cmxsafe-secure-path-observer
  namespace: mac-ssh-demo
spec:
  selector:
    app: cmxsafe-secure-path-observer
  ports:
    - name: http
      port: 8086
      targetPort: http
