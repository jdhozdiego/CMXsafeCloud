apiVersion: v1
kind: Namespace
metadata:
  name: mac-deployment-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-deployment
  namespace: mac-deployment-demo
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-deployment
  template:
    metadata:
      labels:
        app: demo-deployment
        pods-mac-allocator/enabled: "true"
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":"explicit-v6-lan","interface":"net1"}]'
        pods-mac-allocator/mac-dev: ipv6-derived-only
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c", "sleep 36000"]
