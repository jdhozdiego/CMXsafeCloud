apiVersion: v1
kind: ServiceAccount
metadata:
  name: cmxsafemac-ipv6-toolbox
  namespace: mac-allocator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cmxsafemac-ipv6-toolbox-read
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["create", "patch", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["k8s.cni.cncf.io"]
    resources: ["network-attachment-definitions"]
    verbs: ["create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cmxsafemac-ipv6-toolbox-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cmxsafemac-ipv6-toolbox-read
subjects:
  - kind: ServiceAccount
    name: cmxsafemac-ipv6-toolbox
    namespace: mac-allocator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmxsafemac-ipv6-toolbox
  namespace: mac-allocator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmxsafemac-ipv6-toolbox
  template:
    metadata:
      labels:
        app: cmxsafemac-ipv6-toolbox
    spec:
      serviceAccountName: cmxsafemac-ipv6-toolbox
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: toolbox
          image: cmxsafemac-ipv6-toolbox:docker-desktop-v1
          imagePullPolicy: IfNotPresent
          stdin: true
          tty: true
          env:
            - name: ALLOCATOR_URL
              value: http://net-identity-allocator.mac-allocator.svc.cluster.local:8080
            - name: TRAFFIC_COLLECTOR_URL
              value: http://cmxsafemac-ipv6-traffic-collector.mac-allocator.svc.cluster.local:8082
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 8Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
